name: Deploy mamage-server

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run tests (optional)
        run: |
          if npm test ; then
            echo "tests ok"
          else
            echo "no tests or tests failed, continue anyway"
          fi

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Sync code to server via rsync
        run: |
          rsync -avz --delete \
            --exclude ".git/" \
            --exclude "node_modules/" \
            --exclude ".github/" \
            --exclude ".env" \
            --exclude "Miniconda3-*" \
            -e "ssh -p ${{ secrets.DEPLOY_PORT }} -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/home/liwy/mamage_server/

      - name: Install, validate env & restart on server
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.DEPLOY_PORT }} \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
          set -e
          cd /home/liwy/mamage_server

          npm ci --omit=dev --verbose || npm install --omit=dev --verbose

          node -e "require('./lib/validateEnv').validateEnvironment(true)"
          npm run db:migrate

          export NODE_ENV=production
          export PORT=3000

          if pm2 describe mamage-server >/dev/null 2>&1; then
            pm2 restart mamage-server --update-env
          else
            pm2 start app.js --name mamage-server --update-env
          fi

          pm2 save
          EOF
