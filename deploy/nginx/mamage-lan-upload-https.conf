server {
    listen 3443 ssl http2;
    server_name lan.mamage.wenyuli.site;

    ssl_certificate /Users/liwenyu/.mamage-lan-https/fullchain.pem;
    ssl_certificate_key /Users/liwenyu/.mamage-lan-https/privkey.pem;
    ssl_session_cache shared:mamage_lan_ssl:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 1024m;

    location /api/upload/ {
        proxy_pass http://mamage_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /api/ {
        proxy_pass http://mamage_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location / {
        return 204;
    }
}
